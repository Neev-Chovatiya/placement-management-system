services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms_app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=pms_db;User Id=sa;Password=YourSecurePassword123!;TrustServerCertificate=True
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pms_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourSecurePassword123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourSecurePassword123! -Q 'SELECT 1' -C"]
      interval: 15s
      timeout: 10s
      retries: 15
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
